
<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RefMoney - WhatsApp Style Group Call</title>
    
    <script src='https://meet.jit.si/external_api.js'></script>
    
    <style>
        /* WhatsApp Theme Styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b141a; /* WhatsApp Dark Mode Background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Header like WhatsApp */
        .header {
            height: 60px;
            background-color: #075E54;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
            position: relative;
        }

        .header img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
            border: 1px solid #fff;
        }

        .header-text h3 {
            margin: 0;
            font-size: 16px;
        }

        .header-text p {
            margin: 0;
            font-size: 12px;
            color: #d1d1d1;
        }

        /* Main Video Container */
        #video-container {
            width: 100%;
            height: calc(100% - 140px); /* Adjusting for header and footer */
            background: #111b21;
        }

        /* Footer Controls */
        .footer-controls {
            height: 80px;
            background-color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            border-top: 1px solid #222d34;
        }

        .btn-end {
            background-color: #ea0038;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-end svg {
            fill: white;
            width: 28px;
            transform: rotate(135deg);
        }

        /* Small notification badge */
        .live-badge {
            position: absolute;
            right: 20px;
            background: #25d366;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://via.placeholder.com/40/25d366/ffffff?text=RM" alt="Admin">
        <div class="header-text">
            <h3>RefMoney Group Call</h3>
            <p id="status">Connecting...</p>
        </div>
        <div class="live-badge">Encrypted</div>
    </div>

    <div id="video-container"></div>

    <div class="footer-controls">
        <button class="btn-end" onclick="leaveCall()">
            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        </button>
    </div>

    <script>
        // Jitsi Setup
        const domain = 'meet.jit.si';
        const options = {
            roomName: 'RefMoney_Global_Meeting_Room_Shatrudhan_2026', // यो रुम नाममा सबै युजर भेट हुनेछन्
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#video-container'),
            configOverwrite: { 
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: false,
                disableDeepLinking: true
            },
            interfaceConfigOverwrite: {
                // अनावश्यक बटनहरू हटाएर ह्वाट्सएप जस्तै सफा बनाउने
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'chat', 'tileview', 'raisehand'
                ],
                MOBILE_APP_PROMO: false,
                SHOW_JITSI_WATERMARK: false
            }
        };

        const api = new JitsiMeetExternalAPI(domain, options);

        // Events
        api.addEventListener('videoConferenceJoined', () => {
            document.getElementById('status').innerText = 'Online • Multi-person Call';
        });

        api.addEventListener('videoConferenceLeft', () => {
            window.location.href = 'profile.html';
        });

        function leaveCall() {
            api.executeCommand('hangup');
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
