<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RefMoney - Login & Join</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #28a745, #1e7e34); 
            height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; 
        }
        .login-card { 
            background: #fff; width: 92%; max-width: 380px; padding: 35px 25px; 
            border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; 
        }
        .logo { font-size: 32px; font-weight: 700; color: #28a745; margin-bottom: 5px; }
        .logo span { color: #333; }
        .tagline { color: #777; font-size: 13px; margin-bottom: 25px; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: 600; color: #555; margin-left: 5px; }
        input { 
            width: 100%; padding: 14px; margin-top: 5px; border: 1.5px solid #eee; 
            border-radius: 12px; outline: none; background: #f9f9f9; font-size: 15px; transition: 0.3s;
        }
        input:focus { border-color: #28a745; background: #fff; box-shadow: 0 0 8px rgba(40,167,69,0.1); }
        
        .btn-primary { 
            width: 100%; padding: 15px; background: #28a745; color: white; border: none; 
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; 
            margin-top: 20px; box-shadow: 0 5px 15px rgba(40,167,69,0.3);
        }
        .btn-primary:disabled { background: #94d3a2; cursor: not-allowed; }
        
        .error-msg { color: #d9534f; font-size: 12px; margin-top: 10px; display: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">Ref<span>Money</span></div>
    <div class="tagline">Enter valid referral ID to get started.</div>
    
    <div class="input-group">
        <label>Gmail Address</label>
        <input type="email" id="email" placeholder="example@gmail.com">
    </div>

    <div class="input-group">
        <label>Create Password</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <div class="input-group">
        <label>Referral ID (Required)</label>
        <input type="text" id="refInput" placeholder="Enter ID to join">
    </div>
    
    <div id="errorBox" class="error-msg">Invalid Referral ID!</div>
    
    <button id="authBtn" class="btn-primary" onclick="handleAuth()">Login / Sign Up</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCgqr5uCLZIeFUVIHiBppwpzLbYAyhGsIc",
        authDomain: "refmoney-ecb39.firebaseapp.com",
        projectId: "refmoney-ecb39",
        storageBucket: "refmoney-ecb39.firebasestorage.app",
        messagingSenderId: "900346819230",
        appId: "1:900346819230:web:3d1a1af4ce05f546f3c18f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.handleAuth = async function() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();
        const refEntered = document.getElementById('refInput').value.trim();
        const btn = document.getElementById('authBtn');
        const errorBox = document.getElementById('errorBox');

        // १. अनिवार्य फिल्ड चेक
        if (!email || !pass) {
            alert("Email and Password are required!");
            return;
        }

        // २. Gmail Format Check (यसले जथाभाबी इमेल हाल्नबाट रोक्छ)
        const gmailRegex = /^[a-z0-9](\.?[a-z0-9]){5,}@gmail\.com$/;
        if (!gmailRegex.test(email)) {
            alert("कृपया सही Gmail Address हाल्नुहोस् (example@gmail.com)");
            return;
        }

        // ३. पासवर्डको लम्बाई चेक
        if (pass.length < 6) {
            alert("Password must be at least 6 characters!");
            return;
        }

        btn.innerText = "Verifying Access...";
        btn.disabled = true;
        errorBox.style.display = "none";

        try {
            const userRef = doc(db, "users", email);
            const userSnap = await getDoc(userRef);

            // ४. यदि पुरानो युजर हो भने लगइन गर्ने
            if (userSnap.exists()) {
                const data = userSnap.data();
                if (data.password === pass) {
                    localStorage.setItem("userEmail", email);
                    window.location.href = "profile.html";
                } else {
                    alert("Wrong Password! You are not the owner of this account.");
                    resetBtn();
                }
            } else {
                // ५. नयाँ युजरको लागि रेफरल चेक गर्ने (नयाँ युजरलाई मात्र Referral ID अनिवार्य)
                if (!refEntered) {
                    alert("Referral ID is required for New Users!");
                    resetBtn();
                    return;
                }

                let isValid = false;

                // मास्टर कोड चेक
                if (refEntered === "123456") {
                    isValid = true;
                } else {
                    // डेटाबेसमा अरू कसैको ID सँग मिल्छ कि चेक गर्ने
                    const q = query(collection(db, "users"), where("myId", "==", refEntered));
                    const qSnap = await getDocs(q);
                    if (!qSnap.empty) isValid = true;
                }

                if (isValid) {
                    // नयाँ युजरको लागि Unique ID बनाउने
                    const uniqueId = "REF" + Math.floor(1000 + Math.random() * 9000);

                    await setDoc(userRef, {
                        gmail: email,
                        password: pass,
                        myId: uniqueId, 
                        referredBy: refEntered,
                        level: 0,
                        balance: 0,
                        status: "Active",
                        joinedAt: new Date().toLocaleString()
                    });
                    
                    localStorage.setItem("userEmail", email);
                    alert("Welcome! Your New Referral ID is: " + uniqueId);
                    window.location.href = "profile.html";
                } else {
                    errorBox.style.display = "block";
                    resetBtn();
                }
            }
        } catch (e) {
            alert("Error: " + e.message);
            resetBtn();
        }
    }

    function resetBtn() {
        const btn = document.getElementById('authBtn');
        btn.disabled = false;
        btn.innerText = "Login / Sign Up";
    }
</script>
</body>
</html>
